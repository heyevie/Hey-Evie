  workshop:{title:"Plan Your First Batch Filming Day",prompt:"Date I will batch film: ___\nTime: ___\nWho is watching the kids: ___\n\nMy filming location: ___\nOutfits planned (2-3): ___\n\n7 video ideas I will film:\n1. ___ 2. ___ 3. ___ 4. ___ 5. ___ 6. ___ 7. ___\n\nPut it in your calendar NOW. Screenshot this and post it to the circle so we can cheer you on!",actionStep:"Schedule your first batch filming day in your calendar right now. Pick the date, block the time."}
},
// ── COURSE 4: Canva / Media Kit ──
"c4m0":{
  intro:{headline:"Why You Need a Media Kit",sub:"A media kit is your business card, resume, and portfolio all in one. Brands expect it.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"What a Media Kit Is",body:"A media kit is a 1-2 page visual document you send to brands when pitching.\n\nIt includes: your bio, your niche, your audience stats, your platforms, past collaborations, and your rates.\n\nBrands receive hundreds of pitches. A professional media kit instantly separates you from the crowd."},
    {title:"When Do You Need One?",body:"You need a media kit BEFORE you start pitching brands.\n\nYou can create one at:\n- 0 followers (for UGC work)\n- 500 followers (micro-influencer pitches)\n- 5,000+ followers (full influencer campaigns)\n\nHaving it ready means never missing an opportunity because you were not prepared."},
    {title:"The Canva Advantage",body:"You do not need a designer. Canva has free media kit templates that look professional.\n\nBrands cannot tell the difference between a Canva media kit and one made by a graphic designer — and they don't care.\n\nWhat they care about: does this creator look professional and organized?"}
  ],
  tip:"A media kit is not just a document — it is proof that you take your business seriously. Brands notice that immediately.",
  workshop:{title:"Media Kit Audit",prompt:"Before building, let's see what you have:\n\nDo you have a media kit? Yes / No\n\nIf yes — rate it 1-10: ___\nWhat is missing: ___\n\nIf no — list what you would put on it:\n- My niche: ___\n- My platforms and current stats: ___\n- My top performing content: ___\n- My rates (estimate): ___\n\nYour homework: open Canva today and start your media kit.",actionStep:"Open Canva today and search 'media kit'. Pick a template and save it — you are starting today."}
},
"c4m1":{
  intro:{headline:"Designing Your Media Kit in Canva",sub:"Step-by-step: from blank canvas to a media kit brands will love."},
  points:[
    {title:"Start With a Template",body:"Go to Canva.com → search 'Media Kit' → choose a clean, professional template.\n\nPick one that matches your brand colors (or closest to them). You will customize everything.\n\nDo NOT start from scratch. Templates save hours and the result looks better."},
    {title:"Page 1: Who You Are",body:"Your cover page should have:\n✓ A great photo of you (professional or high-quality casual)\n✓ Your name + handle\n✓ Your niche tagline\n✓ Your brand colors\n\nThis is your first impression. Make it feel like YOU. Warm, inviting, professional."},
    {title:"Page 2: Your Stats + Story",body:"Include:\n✓ Follower counts across all platforms\n✓ Average engagement rate (likes + comments ÷ followers × 100)\n✓ Your audience demographics (age, location if you know it)\n✓ A short 3-4 sentence bio that tells your story\n✓ 2-3 screenshots of your best performing content"}
  ],
  tip:"Brands look at engagement rate, not follower count. A creator with 2K followers and 12% engagement is more valuable to most brands than one with 20K and 1%. Know your numbers.",
  workshop:{title:"Build Page 1 of Your Media Kit",prompt:"Open Canva and choose a media kit template.\n\nPage 1 checklist:\n☐ Great photo of me\n☐ My name and main handle\n☐ My niche tagline: 'I help ___ do ___'\n☐ Brand colors that feel like me\n\nPost a screenshot in the circle when you're done — we want to see it!",actionStep:"Complete page one of your Canva media kit — photo, name, handle, niche tagline. Post a screenshot in the circle."}
},
"c4m2":{
  intro:{headline:"Stats, Rates, and Past Work",sub:"The numbers that make brands say yes."},
  points:[
    {title:"How to Calculate Your Engagement Rate",body:"Formula: (Total likes + comments on a post) ÷ Followers × 100\n\nExample: 200 likes + 30 comments = 230 ÷ 2000 followers × 100 = 11.5% engagement\n\nAverage is 1-3%. Above 5% is strong. Above 8% is exceptional.\n\nIf you have strong engagement, LEAD with that number."},
    {title:"Setting Your Rates",body:"Starting rates for creators (adjust up as you grow):\n\n- UGC content (no posting): $150-400 per video\n- Instagram Story: $100-300\n- Instagram Feed Post: $200-500\n- TikTok Video: $200-600\n- Full Package (multiple posts): negotiate\n\nNever accept free product as payment once you have an audience. Your content has value."},
    {title:"What to Include as Past Work",body:"Even if you have not worked with brands yet, include:\n✓ 3 screenshots of your best content\n✓ Any stats on those posts (views, saves, shares)\n✓ Testimonials if you have them\n✓ Niches you have covered\n\nNo brand work yet? Do 2-3 mock brand posts for products you already own. Add those."}
  ],
  tip:"Never apologize for your rates. Never negotiate against yourself before a brand even responds. Send your rates with confidence.",
  workshop:{title:"Calculate Your Numbers",prompt:"Do this right now:\n\nMy average engagement rate: ___%\nMy strongest platform: ___\nMy best performing post views/saves: ___\n\nMy starter rates:\n- UGC video: $___\n- Story post: $___\n- Feed/TikTok post: $___\n- Full package: $___\n\nAdd these to your media kit. You now have a real rate card.",actionStep:"Calculate your engagement rate right now and write your starter rate card. Add both to your media kit today."}
},
"c4m3":{
  intro:{headline:"Finishing and Sending Your Media Kit",sub:"A media kit that never gets sent is just a pretty document. Let's change that."},
  points:[
    {title:"Final Checklist Before You Export",body:"Before you export:\n✓ Spelling and grammar check (especially your name and handles!)\n✓ All links and handles are correct\n✓ Photo quality is clear (not blurry)\n✓ Colors are consistent\n✓ Your contact email is visible\n\nExport as PDF (not editable) — looks professional, easy to send."},
    {title:"How to Send It",body:"When emailing a brand:\n\nSubject: [Your Name] — Creator Partnership Inquiry\nEmail: Short intro, why you love the brand, what you offer.\nAttachment: Your media kit PDF\n\nKeep the email to 4-6 sentences. Brands receive hundreds of pitches — clear and concise wins."},
    {title:"Where to Find Brands to Pitch",body:"Start with brands you already USE and LOVE:\n\n1. Tag them in organic content first (get on their radar)\n2. Find their email on their website (usually press@ or partnerships@)\n3. DM them on Instagram as a backup\n4. Use platforms like Collabstr or Aspire to be discovered\n\nWarm pitches (brands you already use) have a much higher success rate."}
  ],
  tip:"Send 5 pitches this week. Just 5. Not perfect pitches — real pitches. The first yes changes everything.",
  workshop:{title:"Send Your First Pitch",prompt:"Choose one brand you genuinely use and love.\n\nBrand: ___\nWhy you love them: ___\nHow your audience aligns with their customer: ___\n\nDraft your 4-sentence pitch email:\n1. Who you are + your niche\n2. Why you love their brand specifically\n3. What you're proposing\n4. Your call to action (media kit attached)\n\nSend it. Screenshot the sent email and post in the circle!",actionStep:"Send your media kit to one brand you genuinely use and love. Just one pitch. Do it today."}
},
// ── COURSE 5: Content That Converts ──
"c5m0":{
  intro:{headline:"The 3-Second Hook Formula",sub:"You have 3 seconds to stop the scroll. Here is exactly how.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"Why the First 3 Seconds Win or Lose",body:"TikTok and Reels decide in the first 3 seconds whether to push your content to more people.\n\nIf viewers swipe away immediately — the algorithm buries it.\nIf they watch past 3 seconds — the algorithm pushes it to more.\n\nYour hook is the most important part of every single video."},
    {title:"The Hook Formula",body:"The best hooks do one of three things:\n\n1. Create CURIOSITY: 'The one thing I wish someone told me before I had kids...'\n2. Make a BOLD CLAIM: 'I grew from 0 to 10K followers doing this one thing'\n3. Speak DIRECTLY to pain: 'If you're a tired mom who can't find time to post — watch this'\n\nTest all three. See what your audience responds to."},
    {title:"The First Line Rule",body:"Your very first line (spoken or on screen) is your hook.\n\nDo NOT start with:\n✗ 'Hey guys, so today I wanted to...'\n✗ 'Okay so this is kind of a random video but...'\n\nStart IN the middle of something interesting.\n✓ 'Nobody talks about how hard it is to...'\n✓ 'I made this mistake for 2 years and it cost me...' "}
  ],
  tip:"Rewatch your last 10 videos. Count how many start with a real hook in the first 3 seconds. Then rewatch someone you admire. See the difference.",
  workshop:{title:"Write 5 Hooks for Your Next Post",prompt:"Using the 3 hook types, write one of each for your niche:\n\nCuriosity hook: 'Nobody talks about how ___...'\n\nBold claim: 'I ___ and it completely changed my ___'\n\nPain point: 'If you're a mom who ___, this is for you'\n\nPersonal story: 'I used to ___ until I discovered ___'\n\nQuestion: 'Have you ever wondered why ___ ?' \n\nChoose the strongest one for your next video. Post the hook here for feedback!",actionStep:"Rewrite the opening line of your next video as a real hook. Film it and compare it to your last video."}
},
"c5m1":{
  intro:{headline:"Script Structure That Keeps People Watching",sub:"Most creators lose 50% of viewers in the first 15 seconds. Here's how not to."},
  points:[
    {title:"The 4-Part Video Structure",body:"Every performing video follows a structure:\n\n1. HOOK (0-3 sec): Stop the scroll\n2. SETUP (3-15 sec): What this is about, why it matters\n3. VALUE (15-45 sec): The actual content, tip, or story\n4. CTA (last 5 sec): What to do next\n\nThat's it. Simple framework. Apply it to every video."},
    {title:"The Setup: Buy Their Attention",body:"After the hook, you have 10 seconds to earn the right to keep talking.\n\nTell them WHAT they will get and WHY it matters to them.\n\n'Because I spent 3 years getting this wrong and I want to save you the same time...'\n\nThis is called the setup. It is a promise — and it keeps them watching to collect on it."},
    {title:"The CTA: Every Video Needs One",body:"Do not end a video without telling your viewer what to do next.\n\nChoose ONE of these:\n- 'Follow for more...'\n- 'Comment below if...'\n- 'Save this for later'\n- 'Share this with a mom who needs it'\n\nOne CTA per video. Not five. One. Make it feel natural, not forced."}
  ],
  tip:"Your CTA is not begging. It is direction. Your audience WANTS to know what to do next. Give them clear direction and they will take it.",
  workshop:{title:"Script Your Next Video",prompt:"Use the 4-part structure:\n\nHOOK (3 seconds): ___\n\nSETUP (10 seconds): ___\n\nVALUE (30-45 seconds — bullet points are fine):\n- ___\n- ___\n- ___\n\nCTA (5 seconds): ___\n\nFilm this video today using your script. Post it and share the link in the circle!",actionStep:"Script your next video using the 4-part structure — hook, setup, value, CTA. Film it before the day is over."}
},
"c5m2":{
  intro:{headline:"Captions That Drive Saves and Shares",sub:"Captions are the secret weapon most creators ignore. Do not be most creators."},
  points:[
    {title:"Why Captions Matter",body:"Saves and shares are the highest-value engagement signals on Instagram and TikTok.\n\nSaves = 'this is useful, I'll come back to it'\nShares = 'this is so good/relatable I need someone else to see it'\n\nBoth of these MASSIVELY signal the algorithm to push your content to more people.\n\nCaption writing is how you trigger saves and shares."},
    {title:"Caption Formulas That Work",body:"Formula 1 — STORY: Hook + relatable story + lesson + CTA\n\nFormula 2 — LIST: Hook + 5 useful tips + save reminder\n\nFormula 3 — QUESTION: Ask a relatable question your audience will want to answer\n\nFormula 4 — CONFESSION: Start with 'Real talk:...'  or 'Unpopular opinion:...' — vulnerability drives shares."},
    {title:"The Save-Worthy Caption",body:"A caption gets saved when it has:\n✓ Practical information people want to reference again\n✓ A list or steps they will use later\n✓ An emotional truth they want to keep\n\nTry ending a caption with: 'Save this for the next time you need a reminder that...'\n\nThat single line increased saves for creators by 30-50%."}
  ],
  tip:"Write captions as if you're texting your best friend — but a best friend who also happens to know everything about your topic. That tone converts.",
  workshop:{title:"Write 3 Captions",prompt:"Using the formulas, write 3 captions for your next 3 posts:\n\nCaption 1 (Story formula):\n[Hook] + [your story] + [lesson] + [CTA]\n___\n\nCaption 2 (List formula):\n[Hook] + [3-5 tips] + 'Save this!'\n___\n\nCaption 3 (Vulnerability formula):\n'Real talk:...'\n___\n\nShare your favorite one in the circle for feedback!",actionStep:"Write three captions using the formulas and post the strongest one today with a save prompt at the end."}
},
"c5m3":{
  intro:{headline:"Understanding the Algorithm (Simply)",sub:"The algorithm is not your enemy. Here is what it actually rewards."},
  points:[
    {title:"What the Algorithm Actually Wants",body:"Every social media algorithm wants the same thing: to keep people on the app as long as possible.\n\nSo it rewards creators whose content makes people:\n- STOP scrolling (hook)\n- WATCH all the way through (retention)\n- ENGAGE (like, comment, save, share)\n- COME BACK (consistent posting)\n\nCreate content that does those 4 things. The algorithm will find your people."},
    {title:"The Metrics That Matter",body:"Focus on these in this order:\n\n1. Watch time / completion rate (most important)\n2. Saves (high-quality signal)\n3. Shares (highest-quality signal)\n4. Comments (shows community)\n5. Likes (least important, but still counts)\n\nDo NOT obsess over follower count. Focus on content quality and consistency."},
    {title:"The Consistency Compound",body:"Here is what most creators do not understand: the algorithm rewards CONSISTENT creators.\n\nPosting 1x per day for 60 days > posting 5x per day for 2 weeks then disappearing.\n\nPick a sustainable posting schedule and commit to it. 3-5x per week is plenty if the content is good."}
  ],
  tip:"The algorithm is just a machine trying to show people content they will like. Make content people genuinely like, and the algorithm becomes your biggest distributor.",
  workshop:{title:"Audit Your Last 10 Posts",prompt:"Look at your last 10 posts and fill in:\n\nAverage watch time or completion rate: ___\nPost with most saves: ___\nPost with most shares: ___\nPost with most comments: ___\n\nWhat did your top posts have in common?\n___\n\nWhat will you do differently based on this?\n___\n\nOne change I'm making starting with my next post: ___",actionStep:"Check your last 10 posts' analytics right now. Write down what your top three had in common."}
},
// ── COURSE 6: Land Brand Deals ──
"c6m0":{
  intro:{headline:"You Can Start Pitching at Any Follower Count",sub:"Brand deals are not reserved for people with 100K followers. Here is the truth.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"The Micro-Influencer Advantage",body:"Brands are actively moving toward micro and nano influencers (1K-50K followers) because:\n\n- Higher engagement rates\n- More authentic recommendations\n- More affordable for budget-conscious brands\n- Stronger community trust\n\nYour size is not your limitation. It might actually be your competitive advantage."},
    {title:"What Brands Are Actually Looking For",body:"Before a brand says yes, they check:\n✓ Engagement rate (not follower count)\n✓ Content quality (is it on brand?)\n✓ Audience alignment (do her followers match our customer?)\n✓ Professionalism (is her pitch clear? Does she have a media kit?)\n\nFocus on these four things. They are all within your control."},
    {title:"Finding Brands That Are a Good Fit",body:"Start with brands you already USE. This is non-negotiable.\n\nWhy? Because:\n1. Your pitch will be authentic\n2. Your content will convert\n3. You will be easier to work with\n4. Long-term partnerships are more likely\n\nMake a list of 10 brands you genuinely use and love right now."}
  ],
  tip:"The best brand deal you can land is with a brand you are already recommending for free. You are currently giving them marketing they are not paying for. That ends now.",
  workshop:{title:"Your Brand Hit List",prompt:"Write your Top 10 brand pitching targets:\n\nBrands I already use and genuinely love:\n1-5: Products I use daily or weekly\n6-8: Services or apps I recommend\n9-10: Dream brands I wish I could partner with\n\nFor each one:\n- Their Instagram handle: @___\n- Their website: ___\n- Contact email if you can find it: ___\n\nYou now have a 10-brand pipeline. This is your pitch roadmap.",actionStep:"Write your top 10 brand pitch targets right now. Find the contact email for at least three of them."}
},
"c6m1":{
  intro:{headline:"The Pitch Email That Gets a Yes",sub:"The exact framework for a pitch that converts."},
  points:[
    {title:"The 5-Line Pitch Formula",body:"Subject: Creator Partnership Inquiry — [Your Name]\n\nLine 1: Who you are + your niche in one sentence\nLine 2: Why you love THIS brand specifically (be specific)\nLine 3: Your audience and why they are their customer\nLine 4: What you are proposing\nLine 5: Next step (media kit attached, open to discuss)\n\nThat is it. Short. Clear. Confident."},
    {title:"What NOT to Do",body:"✗ Do not apologize for your follower count\n✗ Do not use a generic template they can tell is copy-paste\n✗ Do not write 3 paragraphs before getting to the point\n✗ Do not say 'I think I would be a great fit' (say 'I AM a great fit, here's why')\n✗ Do not follow up more than twice\n\nYour pitch is a business communication. Treat it like one."},
    {title:"Where to Send It",body:"Finding brand emails:\n1. Go to their website → scroll to footer → look for 'press', 'partners', or 'contact'\n2. Google: '[Brand name] influencer marketing email'\n3. LinkedIn: search the brand and find their marketing manager\n4. Instagram DM: 'Hi! I sent an email to [email] — just wanted to make sure you received it'\n\nMost brands respond to email. DM is a good backup."}
  ],
  tip:"Brands get hundreds of generic 'I love your brand' pitches. Be specific. Name the exact product you use, the exact reason you love it, and the exact audience you will put it in front of. Specific = professional.",
  workshop:{title:"Write Your First Pitch Email",prompt:"Using the 5-line formula, write your pitch:\n\nSubject: ___\n\nLine 1 (who you are): ___\nLine 2 (why THIS brand): ___\nLine 3 (your audience): ___\nLine 4 (what you're proposing): ___\nLine 5 (next step): ___\n\nDoes it feel confident and specific? Read it out loud.\n\nSend it today. You are ready.",actionStep:"Write your pitch email using the 5-line formula and send it to one brand today. One real pitch."}
},
"c6m2":{
  intro:{headline:"Negotiating Your Rate With Confidence",sub:"You set the rate. You hold the rate. Here is how."},
  points:[
    {title:"Know Your Numbers Before You Pitch",body:"Go into every pitch knowing exactly what you charge.\n\nHave a rate card:\n- UGC video only (no posting): $150-400\n- Story feature: $100-300\n- Feed post: $200-600\n- TikTok video: $200-600\n- Full campaign package: negotiate based on scope\n\nYour rate goes UP as your stats improve. Review every 3 months."},
    {title:"When They Say 'We Only Have a Small Budget'",body:"This is a negotiation tactic. You have options:\n\n1. Hold your rate: 'I understand — this is my current rate for this deliverable.'\n2. Adjust deliverables: 'For that budget, I can offer one story instead of a feed post.'\n3. Counter offer: 'I can do it for $X — would that work?'\n\nWhat you should NEVER do: drastically drop your rate because they pushed back once."},
    {title:"The Value of Saying No",body:"Not every brand deal is worth taking.\n\nBefore saying yes, ask:\n✓ Does this brand align with my values?\n✓ Would my audience actually use this?\n✓ Am I being paid fairly for my time?\n✓ Does this help or hurt my brand long-term?\n\nSaying no to a bad deal protects your credibility and makes room for a great one."}
  ],
  tip:"The moment you accept less than you're worth, you train brands to undervalue you. Hold your rate. The right brands will pay it.",
  workshop:{title:"Build Your Rate Card",prompt:"My current stats:\n- Platform 1: ___ followers, ___% engagement\n- Platform 2: ___ followers, ___% engagement\n\nMy rate card:\n- UGC video (no posting): $___\n- Story post: $___\n- Feed/TikTok post: $___\n- Bundle (2 posts + story): $___\n\nSave this in your notes. When a brand asks 'what are your rates?' — you are ready.",actionStep:"Build your rate card right now and save it in your notes. Know your numbers before your next brand conversation."}
},
"c6m3":{
  intro:{headline:"Contracts, Deliverables, and Getting Paid",sub:"Protect yourself. Every brand deal needs a clear agreement."},
  points:[
    {title:"Always Get It in Writing",body:"Whether it is a formal contract or a detailed email thread — always have a written record of:\n✓ What you are creating (exact deliverables)\n✓ When it is due\n✓ How much you are being paid\n✓ When you are being paid\n✓ How many revision rounds are included\n\nNo written agreement = no deal. Always."},
    {title:"Deliverables to Clarify Upfront",body:"Before you start creating, confirm:\n- Video length and format\n- Required talking points or key messages\n- Hashtags and mentions required\n- Posting date and time\n- Content approval process (do they review before you post?)\n- Usage rights (can they reuse your content?)\n\nClear deliverables = happy brand relationship + repeat work."},
    {title:"Getting Paid and Follow-Through",body:"Payment terms to request:\n- 50% upfront, 50% on delivery (for new brands)\n- Net-30 (payment within 30 days of delivery) is industry standard\n\nAfter delivery:\n✓ Send your analytics 72 hours after posting\n✓ Check in with the brand about results\n✓ Ask if they want to continue the partnership\n\nThat follow-through is how you turn one deal into a long-term relationship."}
  ],
  tip:"One brand deal done well is worth ten mediocre ones. Show up, deliver what you promised, and communicate professionally. Repeat clients are the best clients.",
  workshop:{title:"Your Brand Deal Checklist",prompt:"Before your next brand deal, confirm you have:\n\n☐ Written agreement (email or contract)\n☐ Clear deliverables listed\n☐ Posting date confirmed\n☐ Payment terms agreed\n☐ Approval process understood\n☐ Rate agreed and in writing\n\nAfter delivery:\n☐ Analytics screenshot sent\n☐ Thank you sent\n☐ Follow-up for next collaboration scheduled\n\nSave this checklist and use it for every brand deal.",actionStep:"Review your last brand deal or plan your next one using the checklist. Screenshot it and save it."}
},
// ── COURSE 7: UGC ──
"c7m0":{
  intro:{headline:"What Is UGC and Why Brands Are Paying For It",sub:"No following required. This is the fastest way to get paid as a new creator.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"UGC = User Generated Content",body:"UGC is content you create FOR a brand — but you never post it to your own account.\n\nThe brand uses it in their ads, on their website, or in their social media.\n\nYou are paid as a content creator, not as an influencer. Your follower count does not matter at all."},
    {title:"Why Brands NEED UGC",body:"Brands have found that authentic-looking content (like what a real person would film on their phone) outperforms polished studio ads by 2-3x.\n\nSo they hire creators to make that content.\n\nThe market for UGC creators is massive — and most moms do not know it exists yet."},
    {title:"What UGC Work Looks Like",body:"Typical UGC jobs:\n- Film a product review in your kitchen\n- Create a 'how I use this' short video\n- Film a testimonial-style clip\n- Make a 'before and after' video\n\nThey send the product (or you buy it and get reimbursed). You film. You send the file. You get paid.\n\nStarting rates: $150-400 per video."}
  ],
  tip:"UGC is the fastest way to make your first money as a creator because you skip the part where you need thousands of followers. Your phone and your face are all you need.",
  workshop:{title:"Find Your First UGC Opportunity",prompt:"Go to Collabstr.com and create a free profile.\n\nYour UGC creator profile checklist:\n☐ Profile photo (professional-ish, bright, smiling)\n☐ Bio: state that you do UGC + your niche\n☐ Rates listed clearly\n☐ 1-2 sample videos uploaded (film something today if you don't have samples)\n\nPost your Collabstr profile link in the circle!",actionStep:"Create your Collabstr profile today and upload at least one sample video. Your first client finds you when you show up."}
},
"c7m1":{
  intro:{headline:"Building a UGC Portfolio From Scratch",sub:"No paid work yet? No problem. Here is how to build your portfolio today."},
  points:[
    {title:"Spec Work: Your Portfolio Launchpad",body:"Spec work = content you create for a brand without being hired.\n\nHow: Pick 3 products you already own and use. Film 30-60 second videos as if you were hired by each brand.\n\nPost them on your social accounts or just use them as portfolio pieces.\n\nThis gives you 3 samples to show potential clients immediately."},
    {title:"What Makes a Strong UGC Sample",body:"Good UGC content has:\n✓ Clear audio (no background noise)\n✓ Good lighting (face a window)\n✓ A natural, conversational delivery\n✓ A clear product demo or benefit shown\n✓ Authentic emotion — excitement, surprise, satisfaction\n\nBrands want to feel like a real person genuinely loves their product. Be that real person."},
    {title:"Organizing Your Portfolio",body:"Create a simple Google Drive folder with your UGC samples.\n\nLabel them: [Your Name] — [Product Type] — UGC Sample\n\nWhen pitching to brands or applying on platforms, you will share this link.\n\nYou do not need a fancy website. A clean Google Drive is completely professional."}
  ],
  tip:"Your first 3 UGC samples do not have to be perfect. They have to exist. Done beats perfect every single time.",
  workshop:{title:"Create 3 UGC Samples",prompt:"Choose 3 products you own right now:\n1. ___  2. ___  3. ___\n\nFor each one, plan a 30-60 second UGC video:\n- Opening line (hook): ___\n- What you will show: ___\n- Benefit you will highlight: ___\n\nFilm all 3 this week. Upload them to a Google Drive folder.\nShare the best one in the circle for feedback!",actionStep:"Film one UGC sample video today for a product you already own. Upload it to your portfolio folder."}
},
"c7m2":{
  intro:{headline:"How to Price Your UGC Services",sub:"Know your worth, charge your worth, and never apologize for it."},
  points:[
    {title:"UGC Pricing Tiers",body:"Starter (no portfolio yet): $100-200 per video\nGrowing (3-10 samples): $200-400 per video\nEstablished (consistent work): $400-800 per video\nSpecialty niches (finance, health, legal): charge 20-30% more\n\nThese are starting points. Your rate increases with every successful delivery."},
    {title:"What Affects Your Rate",body:"Factors that increase your rate:\n✓ Turnaround time (rush fee for 24-48 hour delivery)\n✓ Exclusivity (brand wants to use it for ads only)\n✓ Usage rights duration (longer = more expensive)\n✓ Raw files (charge extra)\n✓ Multiple concepts/versions\n\nBundle pricing: 3 videos for 20% discount. This secures more work upfront."},
    {title:"The Confidence Mindset",body:"You are not 'just' making a video. You are saving the brand from:\n- Hiring a production team\n- Studio rental costs\n- Actor fees\n- Multiple hours of editing\n\nA $300 UGC video is a massive deal for the brand. Charge accordingly."}
  ],
  tip:"Price yourself too low and brands assume your work is low quality. Confidence in your rate communicates confidence in your work. Both matter.",

    {title:"Platform-Based Client Finding",body:"Best platforms for UGC work:\n\n1. Collabstr — dedicated UGC marketplace, huge brand demand\n2. Billd — brands post UGC campaigns you apply to\n3. Upwork — set up a creator profile for content services\n4. Instagram — DM small to mid-size brands directly\n\nCreate profiles on all four. Apply to 5+ opportunities per week. Consistency wins."},
    {title:"The Cold Outreach Formula",body:"Direct outreach to brands on Instagram:\n\n'Hi [Brand], I'm a UGC creator specializing in [niche]. I made a sample video for your [product] — would you like to see it?'\n\nDo NOT send the video unsolicited. Do NOT pitch rates in the first message.\n\nGet a 'yes, send it over' first. Then send your sample AND your rate card."},
    {title:"Getting Rehired",body:"Delivering great UGC once is how you get paid. Making it easy for the brand to rehire you is how you build income.\n\nAfter delivery:\n✓ Deliver on time or early\n✓ Provide 2-3 versions without being asked\n✓ Send a follow-up asking about next steps\n✓ Suggest future content ideas\n\nOne happy brand becomes a monthly retainer. That is real income stability."}

"c8m0":{
  intro:{headline:"You Did It, Mama.",sub:"Look how far you have come. This is the beginning of everything.",youtubeId:"YOUR_VIDEO_ID_HERE"},
  points:[
    {title:"The Growth You Have Already Made",body:"Think about where you started.\n\nBefore this academy, you might have felt:\n- Overwhelmed about where to begin\n- Unsure if you had what it takes\n- Worried about what people would think\n\nNow? You have a niche. You have a strategy. You have a media kit. You have started. THAT is everything.\n\nThis is worth celebrating. For real."},
    {title:"What Consistent Creators Do That Others Don't",body:"The creators who build real income do not have a magic shortcut.\n\nThey have one formula:\n\n1. Show up consistently\n2. Create content that serves their audience\n3. Pitch brands and monetization opportunities regularly\n4. Adjust what is not working\n5. Celebrate what is\n\nThen they rinse and repeat. That's the whole formula."},
    {title:"Your Growth Is Coming",body:"If you have applied what you have learned in this academy:\n- You are more consistent than 90% of creators\n- You know your niche and your audience\n- You understand what makes content perform\n- You know how to get paid\n\nThe algorithm rewards creators who show up. You are showing up.\n\nTrust the process. The growth is coming."}
  ],
  tip:"The best creators are not the ones who never struggle. They are the ones who decide to keep going no matter what. You are that creator.",
  workshop:{title:"Your Win List + What's Next",prompt:"This is your graduation activity.\n\nList 5 wins from your time in the academy:\n1. ___  2. ___  3. ___  4. ___  5. ___\n\nList 3 things you will commit to going forward:\n1. ___  2. ___  3. ___\n\nWrite a note to yourself from where you are today to where you will be in 90 days:\n___\n\nPost your win list in the Mama Circle. You earned the celebration.",actionStep:"Post your win list to the Mama Circle right now. Five wins minimum. You earned the celebration."}

"c8m1":{
  intro:{headline:"The Rinse and Repeat Formula",sub:"This is the blueprint. Run it on repeat."},
  points:[
    {title:"The Creator Growth Formula",body:"Week 1: Plan your content (pillars + hooks from Hook Vault)\nWeek 2: Batch film (2-hour session, 7-14 videos)\nWeek 3: Post consistently, engage daily\nWeek 4: Review analytics, pitch 3 brands, apply to 3 UGC gigs\n\nRepeat every month.\n\nThis is the formula that works. It is not complicated. It is consistent."},
    {title:"How to Know It's Working",body:"Signs your content is growing:\n✓ Watch time is increasing\n✓ Save and share rates are going up\n✓ Comments are getting more personal and engaged\n✓ DMs from potential clients or followers\n✓ Brand inquiries coming to you\n\nAll of these happen before follower count explodes. Trust the leading indicators."},
    {title:"When to Level Up",body:"You are ready to scale when:\n- You have been consistent for 60+ days\n- You have a solid media kit\n- You have at least 1 successful brand deal or UGC job\n- You know which content performs best for you\n\nAt that point: raise your rates, pursue bigger brands, consider a course or digital product.\n\nThe foundation you built here is what every next level is built on."}
  ],
  tip:"You do not have to be perfect. You do not have to go viral. You just have to show up, serve your audience, and keep going. The results compound over time.",
  workshop:{title:"Your 90-Day Creator Plan",prompt:"Map your next 90 days:\n\nMONTH 1: Foundation\n- Post ___ times per week\n- Batch film on: ___\n- Send ___ brand pitches\n\nMONTH 2: Growth\n- New goal: ___\n- Try this new content style: ___\n- Apply to ___ UGC jobs\n\nMONTH 3: Monetize\n- Income goal: $___\n- Affiliate platforms I will join: ___\n- Brand partnership target: ___\n\nDate I am committing to this: ___\nShare your plan in the circle — let us hold each other accountable!",actionStep:"Map your 90-day creator plan today — month by month. Write your income goal, posting schedule, and pitching target."}
},

"c1m4":{
  intro:{headline:"Protecting Your Energy",sub:"Your consistency is your competitive advantage — protect it."},
  points:[{title:"Energy Is Your Business Currency",body:"A CEO who burns out cannot build. Energy management is a business strategy. The moms who build lasting businesses learn to protect their creative energy the way they protect their income.\n\nThat means saying no to things that do not align. It means rest without guilt. It means systems that keep you moving on the days you feel like stopping."}],
  tip:"Schedule a non-negotiable CEO hour every week. This is protected time for creation, strategy, and showing up for your business. Guard it.",
  workshop:{title:"Energy Audit",prompt:"1. What drains your energy the most as a creator?\n2. What gives you energy and excitement about your content?\n3. What is one thing you will protect or eliminate this week?",actionStep:"Block one hour on your calendar this week labeled CEO Time. No interruptions — just building."}
},
"c2m4":{
  intro:{headline:"Your Unfair Advantage",sub:"Nobody can copy your story — and that is your greatest competitive edge."},
  points:[{title:"Only You Can Tell This Story",body:"Every piece of content that has ever gone viral came from a place of authentic specificity. Not generic advice — a real human being sharing something true from their own lived experience.\n\nYour niche is not just a category. It is the intersection of your story, your skills, and the audience who needs what only you can give them. That is your unfair advantage and nobody can take it."}],
  tip:"Write down three experiences only you have had that relate to your niche. Those are your most powerful content ideas.",
  workshop:{title:"Your Unfair Advantage",prompt:"1. What have you been through that most people in your niche have not?\n2. What perspective do you bring that feels uniquely yours?\n3. What piece of content have you been afraid to make because it feels too personal?",actionStep:"Create the piece of content you have been too afraid to make. Post it this week."}
},
"c3m4":{
  intro:{headline:"Your Signature Style",sub:"The goal is for someone to recognize your content before they even see your face."},
  points:[{title:"Consistency Creates Recognition",body:"Your filming style is part of your brand identity. The creators who grow fastest are not the ones with the best cameras — they are the ones whose content feels unmistakably theirs.\n\nSignature style includes your editing pace, your on-camera energy, your lighting, and the way you talk to your audience. Pick your signature elements and commit to them."}],
  tip:"Choose 2-3 signature elements to repeat in every video — a consistent intro line, a color grade, a way you always close. Repetition builds recognition.",
  workshop:{title:"Define Your Signature Style",prompt:"1. How would you describe your on-camera energy in 3 words?\n2. What 2-3 visual choices will you use in every video going forward?\n3. What is your signature way of starting or ending your content?",actionStep:"Film your next video and deliberately apply your signature elements. Watch it back before posting."}
},
"c4m4":{
  intro:{headline:"Pitching With Your Media Kit",sub:"Your media kit is your business card — make it work for you."},
  points:[{title:"Your Kit Is Your First Impression",body:"A professional media kit is a statement that says I take my business seriously. Most mom creators undercharge because they do not have their story and numbers organized in one place.\n\nYour Canva media kit gives brands exactly what they need to say yes. Update it every 90 days — even small consistent growth tells a powerful story."}],
  tip:"Include your engagement rate in your media kit — it is often more impressive than follower count and brands care deeply about it.",
  workshop:{title:"Media Kit Ready Check",prompt:"1. What is your current follower count and average engagement rate?\n2. What are your top 3 performing content categories?\n3. Which 3 brands would be a perfect fit for your audience right now?",actionStep:"Send your media kit to one brand this week. Practice pitching before you feel ready."}
},
"c5m4":{
  intro:{headline:"Repurposing Content Like a CEO",sub:"One great piece of content should live in at least five places."},
  points:[{title:"Work Once, Post Everywhere",body:"The creators who look like they are everywhere are not creating more — they are repurposing smarter. One video becomes a caption, a story slide, a short clip, a blog post, and a pin.\n\nRepurposing is not laziness. It is leveraging the work you already did to reach the people who missed it the first time on a different platform."}],
  tip:"Every time you film a video, immediately pull 3 quotes from it for captions. That single step doubles your content output with zero extra filming.",
  workshop:{title:"Your Repurposing System",prompt:"1. Pick one recent post — how many ways could you have repurposed it?\n2. What platform are you currently underusing for repurposed content?\n3. What is your plan to repurpose your next piece of content?",actionStep:"Take your best performing post from the last 30 days and repurpose it for one additional platform this week."}
},
"c6m4":{
  intro:{headline:"Building Long-Term Brand Relationships",sub:"One deal is income. Recurring deals are a business."},
  points:[{title:"From One-Time Deal to Ongoing Partnership",body:"Getting a brand deal is one thing. Building a relationship that pays you repeatedly is the real goal. The creators who build consistent brand income treat every partnership like the beginning of a long-term relationship.\n\nCommunicate. Deliver above expectations. Send results. Follow up. These are the habits that turn a first deal into a recurring monthly income stream."}],
  tip:"After every collaboration send a results report — reach, engagement, screenshots of top content. This is what turns one deal into an ongoing partnership.",
  workshop:{title:"Brand Relationship Strategy",prompt:"1. Name one brand you would want to work with repeatedly.\n2. What would make you stand out as a partner worth keeping?\n3. Write a follow-up message you could send to a brand after a collaboration.",actionStep:"Send a follow-up or thank you to one brand contact this week — even months after working together."}
},
"c7m4":{
  intro:{headline:"Scaling Your UGC Income",sub:"From your first deal to a consistent monthly income stream."},
  points:[{title:"UGC as a Real Business",body:"Landing your first UGC deal proved you can do this. Now the question is how you scale it into consistent monthly income.\n\nCreators who build real UGC businesses standardize their packages, raise rates with experience, and build a client roster they can return to. This is a product business — and you are the product."}],
  tip:"Create a UGC rate card with three package tiers. Having a clear menu of services makes it easy for brands to say yes and harder to lowball you.",
  workshop:{title:"UGC Business Plan",prompt:"1. How many UGC pieces do you want to create per month?\n2. What is your target monthly income from UGC?\n3. What would you need to charge per video to hit that number?",actionStep:"Set your UGC rates in writing this week. Knowing your worth in numbers is the first step to charging it."}
},
"c8m4":{
  intro:{headline:"Launching and Marketing Your Product",sub:"Building it was half the work — now you get it in front of the right people."},
  points:[{title:"Sell the Problem Before the Solution",body:"The biggest mistake digital product creators make is building in silence and launching to crickets. The creators who sell consistently have been warming up their audience for weeks before they reveal the product exists.\n\nContent about the problem your product solves is pre-launch marketing. Do it for at least 3 weeks before you launch. Then your audience will already want what you are about to offer."}],
  tip:"Start creating content about the problem your product solves 3 weeks before launch. Sell the problem before you sell the solution.",
  workshop:{title:"Launch Strategy",prompt:"1. What problem does your digital product solve?\n2. Who specifically is it for?\n3. What content could you create this week that speaks to that problem without mentioning your product?",actionStep:"Post one piece of pre-launch content this week that speaks to your product's core problem."}
},
"c9m4":{
  intro:{headline:"Your Creator Legacy",sub:"You built this — and what you built matters."},
  points:[{title:"This Was Always About More Than Content",body:"You built something from nothing. No team, no budget, no roadmap — just you, your phone, and a decision that your story was worth sharing.\n\nEvery mom who finds your page and feels less alone because of what you created — that is your legacy. The business is the vehicle. The impact is the destination."}],
  tip:"Write down your creator mission statement today. Not your niche — your WHY. Read it on the hard days. It will keep you going.",
  workshop:{title:"Your CEO Legacy Statement",prompt:"1. Why did you really start creating content?\n2. What do you want moms to feel when they find your page?\n3. Complete this: I am building this because ___.",actionStep:"Post your creator mission this week — in a caption, a story, or your bio. Let your audience see your why."}
}

        + '<div style="display:flex;gap:8px;margin-bottom:14px">'
        + '<button id="style-short" style="flex:1;padding:10px;background:#fff;border:1.5px solid rgba(196,97,74,.2);border-radius:12px;font-size:13px;font-weight:800;color:#c4614a;cursor:pointer;font-family:\'Nunito\',sans-serif">Short and sweet</button>'
        + '<button id="style-detail" style="flex:1;padding:10px;background:#fff;border:1.5px solid rgba(196,97,74,.2);border-radius:12px;font-size:13px;font-weight:800;color:#c4614a;cursor:pointer;font-family:\'Nunito\',sans-serif">Break it down</button>'
        + '</div>'
        + '<p style="font-size:14px;color:#1a0d08;line-height:1.75;margin-bottom:10px">Now tell me — what is the number one thing you want to figure out right now? Is it what to post, how to grow, how to make money, or something else?</p>'
        + '<p style="font-size:13px;color:#9a7060;font-style:italic">Just type it below like you are texting a friend. There is no wrong answer.</p>'
        + '</div></div>';
    } else {
      // Returning user — show quick prompts
      bubs = '<div style="margin-bottom:12px">'
        + '<p style="font-size:12px;color:#9a7060;font-weight:700;margin-bottom:10px;text-align:center">What can I help you with today?</p>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
        + QUICK.map(function(q){
            return '<button data-qp="'+esc(q.text)+'" style="background:#fff;border:1.5px solid rgba(196,97,74,0.15);border-radius:12px;padding:10px;cursor:pointer;font-size:12px;font-weight:700;color:#3a1e14;text-align:left;font-family:\'Nunito\',sans-serif;line-height:1.4">'+q.text+'</button>';
          }).join('')
        + '</div></div>';
    }
  }

  msgs.forEach(function(m, idx){
    if(!m || !m.content) return;
    var isUser = m.role === "user";
    var isError = m.content.indexOf("Lost my connection") >= 0 || m.content.indexOf("timed out") >= 0 || m.content.indexOf("lot of messages") >= 0 || m.content.indexOf("offline") >= 0;
    bubs += '<div style="display:flex;align-items:flex-end;gap:7px;margin-bottom:10px;justify-content:'+(isUser?"flex-end":"flex-start")+'">'
      + (isUser ? "" : avC(26))

      + (isUser
          ? 'background:linear-gradient(135deg,#c4614a,#d4507a);color:#fff;border-bottom-right-radius:3px'
          : (isError
              ? 'background:#fff5f5;color:#1a0d08;border-bottom-left-radius:3px;border:1px solid rgba(196,97,74,0.2)'
              : 'background:#fff;color:#1a0d08;border-bottom-left-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,0.06)'))
      + '">'
      + m.content.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*\n]+)\*/g,"$1").replace(/^[•\-\*]\s/gm,"").split("\n").join("<br/>")
      + (isError ? '<br/><button data-retry="1" style="margin-top:8px;background:#c4614a;color:#fff;border:none;border-radius:10px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:\'Nunito\',sans-serif">Tap to retry</button>' : '')
      + '</div></div>';
  });

  if(state.loading){
    bubs += '<div style="display:flex;align-items:flex-end;gap:7px;margin-bottom:10px">'
      + avC(26)
      + '<div style="background:#fff;padding:12px 16px;border-radius:16px;border-bottom-left-radius:3px;box-shadow:0 2px 6px rgba(0,0,0,0.06)">'
      + '<span class="dot"></span><span class="dot"></span><span class="dot"></span>'
      + '</div></div>';
  }

  var sendDisabled = state.loading ? 'opacity:.4;pointer-events:none' : 'opacity:1';

  return '<div style="display:flex;flex-direction:column;height:calc(100vh - 130px)">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(135deg,rgba(249,236,230,.9),rgba(253,232,240,.9));border-bottom:1px solid rgba(196,97,74,.1)">'
    + '<div style="display:flex;align-items:center;gap:10px">'
    + avC(38)
    + '<div><div style="font-family:\'Playfair Display\',serif;font-size:15px;color:#1a0d08">Hey Evee</div>'
    + '<div style="font-size:10px;color:#7a4a3a;display:flex;align-items:center;gap:4px">'
    + (state.loading
        ? '<span style="width:5px;height:5px;background:#f0a030;border-radius:50%;display:inline-block"></span>Thinking…'
        : '<span style="width:5px;height:5px;background:#4caf85;border-radius:50%;display:inline-block"></span>Online')
    + '</div></div></div>'
    + (msgs.length > 1 ? '<button id="clear-chat" style="background:none;border:none;color:#b8a090;font-size:11px;cursor:pointer;font-family:\'Nunito\',sans-serif;font-weight:700">Clear</button>' : '')
    + '</div>'
    + '<div id="msg-list" style="flex:1;overflow-y:auto;padding:14px 12px">'
    + bubs
    + '<div id="chat-bottom"></div></div>'
    + '<div style="display:flex;gap:7px;padding:9px 12px;background:'+BG+';border-top:1px solid rgba(196,97,74,.08)">'
    + '<input id="chat-input" style="flex:1;padding:11px 14px;background:#fff;border:1.5px solid rgba(196,97,74,.18);border-radius:20px;font-size:14px;color:#1a0d08;outline:none;font-family:\'Nunito\',sans-serif" placeholder="Ask Evee anything\u2026" value="'+esc(state.input||'')+'"/>'
    + '<button id="send-btn" style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#c4614a,#d4507a);border:none;cursor:pointer;font-size:16px;color:#fff;flex-shrink:0;'+sendDisabled+'">&#10140;</button>'
    + '</div></div>';

function buildSlideList(data,title,key,courseId){
  var slides=[];
  slides.push({type:"intro",data:data.intro||{headline:title,sub:""}});
  (data.points||[]).forEach(function(pt,i){slides.push({type:"point",data:pt,idx:i});});
  if(data.tip)slides.push({type:"tip",data:{tip:data.tip}});
  slides.push({type:"workshop",data:data.workshop||{title:"Reflection",prompt:"What did you learn?"}});
  return slides;
}

function buildWorkshopTab(data,key,answers){
  var ws=data.workshop||{title:"Reflection Activity",prompt:"1. What was your biggest takeaway from this module?\n2. How will you apply this in the next 48 hours?\n3. What is one thing you will do differently starting today?"};
  var allLines=ws.prompt.split("\n").filter(function(l){return l.trim();});
  // Separate numbered questions from instruction text
  var questions=allLines.filter(function(l){return /^\d+\./.test(l.trim());});
  var instructions=allLines.filter(function(l){return !/^\d+\./.test(l.trim());});
  // actionStep is stored separately or falls back to a default
  var actionStep=ws.actionStep||"Apply one thing from this module before your next session. Real growth comes from action, not just knowledge.";
  return '<div style="padding:14px">'
    +'<div class="slide-workshop" style="margin-bottom:14px">'
    +'<p style="font-size:10px;font-weight:900;color:#c4614a;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Workshop Activity</p>'
    +'<h3 style="font-family:\'Playfair Display\',serif;font-size:18px;color:#1a0d08;margin-bottom:10px">'+esc(ws.title)+'</h3>'
    +(instructions.length?'<div style="background:rgba(196,97,74,.05);border-radius:10px;padding:12px;margin-bottom:12px">'
      +instructions.map(function(l){return '<p style="font-size:13px;color:#1a0d08;line-height:1.65;margin-bottom:4px">'+esc(l)+'</p>';}).join('')
      +'</div>':'')

          return '<div style="margin-bottom:14px">'
            +'<p style="font-size:13px;font-weight:800;color:#1a0d08;margin-bottom:6px">'+esc(q)+'</p>'
            +'<textarea data-ws="'+i+'" style="'+inp()+'height:80px;resize:none;margin-bottom:0" placeholder="Your answer…">'+esc(answers[i]||"")+'</textarea>'

        +'<p style="font-size:13px;font-weight:800;color:#1a0d08;margin-bottom:6px">Your reflection:</p>'

    +'</div>';
}

          +'<button data-cc="'+k+'" style="font-size:7px;color:#b8a090;background:none;border:none;cursor:pointer;font-family:\'Nunito\',sans-serif;margin-top:1px">\u2715</button>'

function bindAll(){
  // Splash
  q("splash-create",function(){state.loginMode="create";state.screen="login";save();render();});
  q("splash-signin",function(){state.loginMode="signin";state.screen="login";save();render();});
  q("splash-code",function(){state.loginMode="create";state.showCodeInput=true;state.screen="login";save();render();});
  // Login — use onchange not oninput to avoid keyboard dismiss on every char
  var liName=document.getElementById("li-name");if(liName)liName.onchange=function(){state.loginName=this.value;};
  var liEmail=document.getElementById("li-email");if(liEmail)liEmail.onchange=function(){state.loginEmail=this.value;};
  var liPass=document.getElementById("li-pass");
  if(liPass){liPass.onchange=function(){state.loginPass=this.value;};liPass.onblur=function(){state.loginPass=this.value;render();};}
  var liPass2=document.getElementById("li-pass2");
  if(liPass2){liPass2.onchange=function(){state.loginPass2=this.value;};liPass2.onblur=function(){state.loginPass2=this.value;render();};}
  var liCode=document.getElementById("li-code");
  if(liCode){liCode.onblur=function(){
    var v=this.value;state.loginCode=v;
    var u=v.toUpperCase().trim();var m=ACCESS_CODES[u];
    if(!u){state.loginCodeErr="";state.loginCodePlan=null;}
    else if(m){state.loginCodeErr="";state.loginCodePlan=m;}
    else{state.loginCodeErr="That code is not valid";state.loginCodePlan=null;}
    render();
  };}
  q("li-show-code",function(){state.showCodeInput=true;render();});
  q("li-switch",function(){state.loginMode=state.loginMode==="create"?"signin":"create";state.loginErr="";render();});
  q("forgot-pw",function(){
    var e=document.getElementById("li-email");if(e)state.loginEmail=e.value;
    if(!state.loginEmail.trim()){state.loginErr="Please enter your email address first";render();return;}
    state.loginErr="";
    state.loginLoading=true;render();
    fetch("/api/password-reset",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:state.loginEmail.trim().toLowerCase()})})
    .then(function(r){return r.json();})
    .then(function(){
      state.loginLoading=false;
      state.loginErr="";

function sysPrompt(){
  var p = state.profile || {};
  var niche = p.niche || "mom lifestyle";
  var name = p.name || "mama";
  var stage = p.stage || "growing";
  var goal = p.goal || "grow my following";
  // Pull workshop answers into context so Evee knows what she has worked on
  var wsContext = "";
  var ws = state.workshopAnswers || {};
  var wsKeys = Object.keys(ws);
  if(wsKeys.length > 0){
    wsContext = "\n\nHer completed workshop answers (reference these to personalise your coaching):\n";
    wsKeys.slice(-6).forEach(function(k){
      var answers = ws[k];
      var flat = Object.values(answers).filter(function(v){return v&&v.trim();}).join(' | ');
      if(flat) wsContext += k + ": " + flat.substring(0,200) + "\n";
    });
  }
  // Chat style preference
  var styleNote = p.chatStyle === 'detailed'
    ? "She prefers detailed, thorough explanations."
    : p.chatStyle === 'short'
    ? "She prefers short, punchy replies — get to the point fast."
    : "Match her energy — if she writes a lot, give more; if she writes short, keep it tight.";
  return "You are Evee — a warm, funny, real AI bestie and business coach built specifically for mom content creators. You are that friend who texts back instantly, hypes her up when she needs it, keeps it real when she needs that too, and never ever lets her spiral.\n\n"
    + "CRITICAL FORMATTING RULES — never break these:\n"
    + "- NEVER use asterisks (*) for anything. No bold markdown, no bullet asterisks, nothing.\n"
    + "- NEVER use hashtags unless she specifically asks for caption hashtags.\n"
    + "- Use plain line breaks to separate thoughts. Use dashes (-) for lists if needed.\n"
    + "- 1-2 emojis max per message. Only when it feels natural.\n\n"
    + "ENERGY RULES:\n"
    + "- Match her energy. She texts short? Keep it tight. She writes a paragraph? Meet her there.\n"
    + "- If she sounds tired or overwhelmed, acknowledge it first with one warm sentence before coaching.\n"
    + "- If she sounds hyped, match that energy and build on it.\n"
    + "- Talk TO her like a real friend, not AT her like a coach giving a lecture.\n\n"
    + "COACHING RULES:\n"
    + "- Give ACTUAL content when asked — real hooks, real captions, real scripts, not just instructions.\n"
    + "- End every reply with ONE clear action step. Not two. One.\n"
    + "- When she shares a workshop answer or something personal, reference it specifically — show you were listening.\n"
    + "- " + styleNote + "\n\n"
    + "Her profile: " + name + " | " + niche + " niche | " + stage + " stage | Goal: " + goal
    + wsContext;
}

function sendMsg(text){
  var msg = (typeof text === "string" ? text : (state.input||"")).trim();
  if(!msg || state.loading) return;
  state.input = "";
  if(!state.chatOnboarded){ state.chatOnboarded=true; ss("ev_chat_ob",true); }
  var inputEl = document.getElementById("chat-input");
  if(inputEl){ inputEl.value = ""; inputEl.blur(); }

  // Clean message history - only keep valid alternating pairs
  var rawHistory = (state.messages||[]).filter(function(m){
    return m && m.role && typeof m.content === "string" && m.content.length > 0;
  });

  // Ensure proper alternating user/assistant pattern (API requirement)
  var cleanHistory = [];
  var lastRole = null;
  for(var i = 0; i < rawHistory.length; i++){
    var m = rawHistory[i];
    if(m.role !== lastRole){
      cleanHistory.push(m);
      lastRole = m.role;
    }
    // If same role twice in a row, skip the older one
  }
  // Must start with user message
  while(cleanHistory.length > 0 && cleanHistory[0].role !== "user"){
    cleanHistory.shift();
  }
  // Keep last 10 messages max to avoid token limits
  if(cleanHistory.length > 10) cleanHistory = cleanHistory.slice(cleanHistory.length - 10);

  var newUserMsg = {role:"user", content:msg};
  var apiMessages = cleanHistory.concat([newUserMsg]).map(function(m){
    return {role: m.role === "user" ? "user" : "assistant", content: String(m.content)};
  });

  state.messages = cleanHistory.concat([newUserMsg]);
  state.loading = true;
  render();

  var bottom = document.getElementById("chat-bottom");
  if(bottom) setTimeout(function(){ bottom.scrollIntoView({behavior:"smooth"}); }, 50);

  var controller = null;
  var timeoutId = null;

  try { controller = new AbortController(); } catch(e){}

  // 25 second timeout
  if(controller){
    timeoutId = setTimeout(function(){
      try{ controller.abort(); }catch(e){}
    }, 25000);
  }

  var fetchOptions = {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 600,
      system: sysPrompt(),
      messages: apiMessages
    })
  };
  if(controller) fetchOptions.signal = controller.signal;

  fetch("/api/chat", fetchOptions)
  .then(function(r){
    if(timeoutId) clearTimeout(timeoutId);
    if(!r.ok){
      return r.json().then(function(errData){
        throw new Error(errData.error ? errData.error.message : "Status " + r.status);
      }).catch(function(){ throw new Error("Status " + r.status); });
    }
    return r.json();
  })
  .then(function(data){
    var reply = "";
    if(data && data.content && data.content[0] && data.content[0].text){
      reply = data.content[0].text;
    } else {
      reply = "Something went sideways on my end! Tap send again. \u2665";
    }
    state.messages = state.messages.concat([{role:"assistant", content:reply}]);
    state.loading = false;
    ss("ev_msgs", state.messages);
    render();
    var b2 = document.getElementById("chat-bottom");
    if(b2) setTimeout(function(){ b2.scrollIntoView({behavior:"smooth"}); }, 50);
  })
  .catch(function(err){
    if(timeoutId) clearTimeout(timeoutId);
    var errMsg = "";
    if(err && err.name === "AbortError"){
      errMsg = "That took too long \u2014 my connection timed out. Try again, I\u2019m here! \u2665";
    } else if(err && err.message && err.message.indexOf("rate") >= 0){
      errMsg = "I\u2019m getting a lot of messages right now! Wait a few seconds and try again. \u2665";
    } else if(!navigator.onLine){
      errMsg = "Looks like you\u2019re offline! Check your wifi or data and I\u2019ll be right here. \u2665";
    } else {
      errMsg = "Lost my connection for a second! Just tap send again. \u2665";
    }
    state.messages = state.messages.concat([{role:"assistant", content:errMsg}]);
    state.loading = false;
    render();
  });
}

function genCalIdea(key,toInput){
  state.genLoad=key;render();
  fetch("/api/chat",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:50,
      system:"Social media strategist. ONE content idea max 10 words. Niche:"+(state.profile.niche||"mom lifestyle")+". Just the idea, no quotes.",
      messages:[{role:"user",content:"One content idea"}]}),
  }).then(function(r){return r.json();}).then(function(d){
    var idea=d.content&&d.content[0]?d.content[0].text.trim():"Share your morning routine";
    if(toInput){var t=document.getElementById("cal-text");if(t)t.value=idea;}
    else{var cp=Object.assign({},state.calPosts);cp[key]=idea;state.calPosts=cp;ss("ev_cal",cp);}
    state.genLoad=null;render();
  }).catch(function(){state.genLoad=null;render();});
}

// ─── Handle return from Stripe upgrade ───
(function(){
  try {
    var params = new URLSearchParams(window.location.search);
    if(params.get('upgraded')==='1'){
      // Clean URL immediately
      window.history.replaceState({},'',window.location.pathname);
      var p = state.profile || {};
      if(p.email && state.screen==='main'){
        // Re-check membership silently
        checkMembership(p.email, function(membership){
          if(membership.plan && membership.plan !== 'starter'){
            state.profile = Object.assign({}, state.profile, {plan: membership.plan});
            save();
          }
          // Show upgrade success regardless — Airtable may take a moment to sync
          state.showUpgradeSuccess = true;
          render();
          setTimeout(function(){ state.showUpgradeSuccess = false; render(); }, 5000);
        });
      } else if(p.email){
        // Not on main screen yet — just flag it
        state.showUpgradeSuccess = true;
      }
    }
  } catch(e){}
})();

render();
